name: CI/CD

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  REGISTRY: docker.io
  SCHEDULER_IMAGE: harshkhatri11/jscheduler-scheduler-service
  WORKER_IMAGE: harshkhatri11/jscheduler-worker-service
  FRONTEND_IMAGE: harshkhatri11/jscheduler-frontend

jobs:
  ci:
    name: Build & Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build scheduler-service
        working-directory: scheduler-service
        run: mvn clean package -DskipTests

      - name: Build worker-service
        working-directory: worker-service
        run: mvn clean package -DskipTests

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Log in to Docker Hub
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push scheduler-service image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./scheduler-service
          push: true
          tags: |
            ${{ env.SCHEDULER_IMAGE }}:latest
            ${{ env.SCHEDULER_IMAGE }}:${{ github.sha }}

      - name: Build and push worker-service image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./worker-service
          push: true
          tags: |
            ${{ env.WORKER_IMAGE }}:latest
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}

      - name: Build and push frontend image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to VM (placeholder)
        run: |
          echo "Deploy step — will SSH into VM and pull images in Step 4"