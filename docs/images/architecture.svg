<svg width="100%" viewBox="0 0 680 580" role="img" xmlns="http://www.w3.org/2000/svg">
    <title>Distributed Job Scheduler — System Architecture</title>
    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M2 1L8 5L2 9" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
        <style>
            text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1a1a1a; }
            .th  { font-size: 14px; font-weight: 600; }
            .ts  { font-size: 12px; fill: #555; }
            .c-gray   rect { fill: #f1efe8; stroke: #888780; }
            .c-purple rect { fill: #eeedfe; stroke: #7f77dd; }
            .c-teal   rect { fill: #e1f5ee; stroke: #1d9e75; }
            .c-amber  rect { fill: #faeeda; stroke: #ba7517; }
            .c-coral  rect { fill: #faece7; stroke: #d85a30; }
            .arr { stroke: #888; stroke-width: 1.2; fill: none; }
        </style>
    </defs>

    <!-- Clients -->
    <g class="c-gray">
        <rect x="100" y="40" width="160" height="52" rx="8" stroke-width="0.5"/>
        <text class="th" x="180" y="61" text-anchor="middle" dominant-baseline="central">Angular UI</text>
        <text class="ts" x="180" y="79" text-anchor="middle" dominant-baseline="central">Job management dashboard</text>
    </g>
    <g class="c-gray">
        <rect x="290" y="40" width="160" height="52" rx="8" stroke-width="0.5"/>
        <text class="th" x="370" y="61" text-anchor="middle" dominant-baseline="central">REST clients</text>
        <text class="ts" x="370" y="79" text-anchor="middle" dominant-baseline="central">curl · SDKs · integrations</text>
    </g>

    <line x1="180" y1="92" x2="220" y2="148" class="arr" marker-end="url(#arrow)"/>
    <line x1="370" y1="92" x2="310" y2="148" class="arr" marker-end="url(#arrow)"/>

    <!-- Scheduler Service -->
    <g class="c-purple">
        <rect x="60" y="148" width="360" height="56" rx="8" stroke-width="0.5"/>
        <text class="th" x="240" y="169" text-anchor="middle" dominant-baseline="central">Scheduler Service</text>
        <text class="ts" x="240" y="189" text-anchor="middle" dominant-baseline="central">REST API · cron engine · DelayQueue · lock acquire · publish</text>
    </g>

    <!-- Redis -->
    <g class="c-teal">
        <rect x="444" y="148" width="160" height="56" rx="8" stroke-width="0.5"/>
        <text class="th" x="524" y="169" text-anchor="middle" dominant-baseline="central">Redis</text>
        <text class="ts" x="524" y="189" text-anchor="middle" dominant-baseline="central">Distributed lock · cache</text>
    </g>
    <line x1="420" y1="168" x2="444" y2="168" class="arr" marker-end="url(#arrow)"/>
    <line x1="444" y1="186" x2="420" y2="186" class="arr" marker-end="url(#arrow)"/>

    <!-- Kafka -->
    <g class="c-amber">
        <rect x="60" y="240" width="360" height="52" rx="8" stroke-width="0.5"/>
        <text class="th" x="240" y="261" text-anchor="middle" dominant-baseline="central">Apache Kafka</text>
        <text class="ts" x="240" y="279" text-anchor="middle" dominant-baseline="central">job.trigger · job.result · job.dlq</text>
    </g>
    <line x1="240" y1="204" x2="240" y2="240" class="arr" marker-end="url(#arrow)"/>

    <!-- PostgreSQL -->
    <g class="c-teal">
        <rect x="444" y="240" width="160" height="52" rx="8" stroke-width="0.5"/>
        <text class="th" x="524" y="261" text-anchor="middle" dominant-baseline="central">PostgreSQL</text>
        <text class="ts" x="524" y="279" text-anchor="middle" dominant-baseline="central">jobs · executions · dlq</text>
    </g>
    <line x1="524" y1="204" x2="524" y2="240" class="arr" marker-end="url(#arrow)"/>

    <!-- Workers -->
    <g class="c-purple">
        <rect x="60" y="332" width="104" height="52" rx="8" stroke-width="0.5"/>
        <text class="th" x="112" y="353" text-anchor="middle" dominant-baseline="central">Worker</text>
        <text class="ts" x="112" y="371" text-anchor="middle" dominant-baseline="central">HTTP executor</text>
    </g>
    <g class="c-purple">
        <rect x="188" y="332" width="104" height="52" rx="8" stroke-width="0.5"/>
        <text class="th" x="240" y="353" text-anchor="middle" dominant-baseline="central">Worker</text>
        <text class="ts" x="240" y="371" text-anchor="middle" dominant-baseline="central">Shell executor</text>
    </g>
    <g class="c-purple">
        <rect x="316" y="332" width="104" height="52" rx="8" stroke-width="0.5"/>
        <text class="th" x="368" y="353" text-anchor="middle" dominant-baseline="central">Worker N</text>
        <text class="ts" x="368" y="371" text-anchor="middle" dominant-baseline="central">Scales horizontally</text>
    </g>

    <line x1="112" y1="292" x2="112" y2="332" class="arr" marker-end="url(#arrow)"/>
    <line x1="240" y1="292" x2="240" y2="332" class="arr" marker-end="url(#arrow)"/>
    <line x1="368" y1="292" x2="368" y2="332" class="arr" marker-end="url(#arrow)"/>

    <path d="M112 384 Q112 410 240 410 Q368 410 368 384" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <text class="ts" x="240" y="427" text-anchor="middle">results · failures → DLQ</text>
    <path d="M420 384 Q450 420 524 410 L524 292" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

    <!-- Observability -->
    <g class="c-coral">
        <rect x="60" y="448" width="544" height="72" rx="8" stroke-width="0.5"/>
        <text class="th" x="332" y="469" text-anchor="middle" dominant-baseline="central">Observability</text>
        <text class="ts" x="150" y="492" text-anchor="middle" dominant-baseline="central">Prometheus</text>
        <text class="ts" x="150" y="508" text-anchor="middle" dominant-baseline="central">metrics</text>
        <text class="ts" x="280" y="492" text-anchor="middle" dominant-baseline="central">Loki</text>
        <text class="ts" x="280" y="508" text-anchor="middle" dominant-baseline="central">logs</text>
        <text class="ts" x="400" y="492" text-anchor="middle" dominant-baseline="central">Zipkin</text>
        <text class="ts" x="400" y="508" text-anchor="middle" dominant-baseline="central">traces</text>
        <text class="ts" x="524" y="492" text-anchor="middle" dominant-baseline="central">Grafana</text>
        <text class="ts" x="524" y="508" text-anchor="middle" dominant-baseline="central">unified UI</text>
    </g>

    <line x1="112" y1="384" x2="150" y2="448" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
    <line x1="240" y1="384" x2="240" y2="448" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
    <line x1="368" y1="384" x2="368" y2="448" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>

    <!-- Legend -->
    <line x1="60"  y1="558" x2="84"  y2="558" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text class="ts" x="90"  y="562">synchronous</text>
    <line x1="190" y1="558" x2="214" y2="558" stroke="#aaa" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
    <text class="ts" x="220" y="562">async / event</text>
    <line x1="330" y1="558" x2="354" y2="558" stroke="#ccc" stroke-width="0.5" stroke-dasharray="3 4"/>
    <text class="ts" x="360" y="562">telemetry</text>
</svg>