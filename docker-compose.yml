services:

  # ─── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    container_name: jscheduler-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - core

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: jscheduler-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/commands/stat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - core

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: jscheduler-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      # INTERNAL listener — container-to-container traffic uses the container name
      # EXTERNAL listener — host machine access (IntelliJ, kafka-ui, etc.) uses localhost
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://jscheduler-kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - core

  redis:
    image: redis:7.2
    container_name: jscheduler-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - core

  # ─── Application Services ────────────────────────────────────────────────────

  scheduler-service:
    build:
      context: ./scheduler-service
      dockerfile: Dockerfile
    image: jscheduler/scheduler-service:latest
    container_name: jscheduler-scheduler
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://jscheduler-postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Container-to-container: uses internal Kafka listener on port 29092
      KAFKA_BOOTSTRAP_SERVERS: jscheduler-kafka:29092
      REDIS_HOST: jscheduler-redis
      REDIS_PORT: 6379
      ZIPKIN_BASE_URL: http://jscheduler-zipkin:9411
      LOKI_URL: http://jscheduler-loki:3100
    ports:
      - "8080:8080"
    networks:
      - core

  worker-service:
    build:
      context: ./worker-service
      dockerfile: Dockerfile
    image: jscheduler/worker-service:latest
    container_name: jscheduler-worker
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://jscheduler-postgres:5432/${POSTGRES_DB}
      DB_USERNAME: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      KAFKA_BOOTSTRAP_SERVERS: jscheduler-kafka:29092
      REDIS_HOST: jscheduler-redis
      REDIS_PORT: 6379
      ZIPKIN_BASE_URL: http://jscheduler-zipkin:9411
      LOKI_URL: http://jscheduler-loki:3100
    ports:
      - "8081:8081"
    networks:
      - core

  # ─── Observability ───────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: jscheduler-prometheus
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    depends_on:
      - scheduler-service
      - worker-service
    networks:
      - core

  loki:
    image: grafana/loki:2.9.0
    container_name: jscheduler-loki
    volumes:
      - ./observability/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    networks:
      - core

  zipkin:
    image: openzipkin/zipkin:3
    container_name: jscheduler-zipkin
    ports:
      - "9411:9411"
    networks:
      - core

  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: jscheduler-alertmanager
    volumes:
      - ./observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
    ports:
      - "9093:9093"
    networks:
      - core

  grafana:
    image: grafana/grafana:10.4.0
    container_name: jscheduler-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
    networks:
      - core

volumes:
  postgres_data:
  loki_data:
  grafana_data:

networks:
  core:
    name: core
    driver: bridge