apiVersion: 1

datasources:

  - name: Prometheus
    type: prometheus
    uid: prometheus
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: Loki
    type: loki
    uid: loki
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - matcherRegex: "traceId=(\\w+)"
          name: TraceID
          url: "${ZIPKIN_BASE_URL}/zipkin/traces/${__value.raw}"
          datasourceUid: zipkin

  - name: Zipkin
    type: zipkin
    uid: zipkin
    url: http://zipkin:9411
    editable: false