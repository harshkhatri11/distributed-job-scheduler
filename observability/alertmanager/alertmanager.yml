global:
  resolve_timeout: 5m

route:
  receiver: default-receiver
  group_by:
    - alertname
    - service
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h

receivers:
  - name: default-receiver
    slack_configs:
      - api_url: https://hooks.slack.com/services/placeholder
        channel: "#job-scheduler-alerts"
        title: '{{ .GroupLabels.alertname }}'
        text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        send_resolved: true

inhibit_rules:
  - source_matchers:
      - severity="critical"
    target_matchers:
      - severity="warning"
    equal:
      - service